---
- name: (Deprecation) Catch and report renamed settings
  ansible.builtin.fail:
    msg: >-
      Your configuration contains a variable, which now has a different name.
      Please change your configuration to rename the variable (`{{ item.old }}` -> `{{ item.new }}`).
  when: "lookup('ansible.builtin.varnames', ('^' + item.old + '$'), wantlist=True) | length > 0"
  with_items:
    - { "old": "peertube_playbook_base_path", "new": "<Removed>" }
    - { "old": "peertube_config_dir_path", "new": "peertube_config_path" }
    - { "old": "peertube_data_dir_path", "new": "peertube_data_path" }
    - { "old": "peertube_config_database_hostname", "new": "peertube_database_hostname" }
    - { "old": "peertube_config_database_port", "new": "peertube_database_port" }
    - { "old": "peertube_config_database_username", "new": "peertube_database_username" }
    - { "old": "peertube_config_database_password", "new": "peertube_database_password" }
    - { "old": "peertube_database_sslmode", "new": "peertube_database_ssl_enabled" }
    - { "old": "peertube_config_object_storage_videos_bucket_name", "new": "peertube_config_object_storage_web_videos_bucket_name" }
    - { "old": "peertube_config_object_storage_videos_prefix", "new": "peertube_config_object_storage_web_videos_prefix" }
    - { "old": "peertube_config_object_storage_videos_base_url", "new": "peertube_config_object_storage_web_videos_base_url" }
    - { "old": "peertube_config_redis_hostname", "new": "peertube_redis_hostname" }
    - { "old": "peertube_config_redis_db", "new": "peertube_redis_db" }
    - { "old": "peertube_container_additional_environment_variables", "new": "peertube_environment_variables_additional_variables" }
    - { "old": "peertube_http_header_content_permission_policy", "new": "peertube_http_header_permissions_policy" }

- name: Fail if required PeerTube settings not defined
  ansible.builtin.fail:
    msg: >-
      You need to define a required configuration setting (`{{ item.name }}`).
  when: "item.when | bool and lookup('vars', item.name, default='') | string | length == 0"
  with_items:
    - { "name": "peertube_identifier", when: true }
    - { "name": "peertube_uid", when: true }
    - { "name": "peertube_gid", when: true }
    - { "name": "peertube_hostname", when: true }
    - { "name": "peertube_path_prefix", when: true }
    - { "name": "peertube_container_network", when: true }
    - { "name": "peertube_database_socket_path_host", when: "{{ peertube_database_socket_enabled }}" }
    - { "name": "peertube_database_hostname", when: "{{ not peertube_database_socket_enabled }}" }
    - { "name": "peertube_database_password", when: true }
    - { "name": "peertube_redis_hostname", when: true }
    - { "name": "peertube_config_secret", when: true }
    - { "name": "peertube_config_admin_email", when: true }
    - { "name": "peertube_config_root_user_initial_password", when: true }

- name: Fail if required PeerTube Object Storage settings not defined
  ansible.builtin.fail:
    msg: >-
      You need to define a required configuration setting (`{{ item }}`).
  when: "peertube_config_object_storage_enabled | bool and lookup('vars', item, default='') | string | length == 0"
  with_items:
    - peertube_config_object_storage_endpoint
    - peertube_config_object_storage_region
    - peertube_config_object_storage_credentials_access_key_id
    - peertube_config_object_storage_credentials_secret_access_key
    - peertube_config_object_storage_streaming_playlists_bucket_name
    - peertube_config_object_storage_web_videos_bucket_name

- name: Fail if SMTP settings are missing (and SMTP is enabled by setting host)
  ansible.builtin.fail:
    msg: >-
      You need to define a required configuration setting (`{{ item }}`) to correctly set up email via SMTP.
  when: "peertube_config_smtp_hostname !='' and lookup('vars', item, default='') | string | length == 0"
  with_items:
    - peertube_config_smtp_from

- name: Fail if PeerTube logging level is invalid
  ansible.builtin.fail:
    msg: >-
      peertube_config_log_level must be 'debug', 'info', 'warn', or 'error'
  when: "peertube_config_log_level not in ['debug', 'info', 'warn', 'error']"

- name: Run if Traefik is enabled
  when: peertube_container_labels_traefik_enabled | bool
  block:
    - name: Fail if Traefik settings required for PeerTube are not defined
      ansible.builtin.fail:
        msg: >-
          You need to define a required configuration setting (`{{ item }}`).
      when: "lookup('vars', item, default='') | string | length == 0"
      with_items:
        - peertube_container_labels_traefik_hostname
        - peertube_container_labels_traefik_path_prefix

    # We ensure it doesn't end with a slash, because we handle both (slash and no-slash).
    # Knowing that `peertube_container_labels_traefik_path_prefix` does not end with a slash
    # ensures we know how to set these routes up without having to do "does it end with a slash" checks elsewhere.
    - name: Fail if peertube_container_labels_traefik_path_prefix ends with a slash
      ansible.builtin.fail:
        msg: >-
          peertube_container_labels_traefik_path_prefix (`{{ peertube_container_labels_traefik_path_prefix }}`) must either be `/` or not end with a slash (e.g. `/peertube`).
      when: "peertube_container_labels_traefik_path_prefix != '/' and peertube_container_labels_traefik_path_prefix[-1] == '/'"

    - name: Fail if PeerTube hosted at a subpath
      ansible.builtin.fail:
        msg: >-
          PeerTube can only be hosted at the base path (`/`), not at a subpath like `{{ peertube_container_labels_traefik_path_prefix }}`).
      when: "peertube_container_labels_traefik_path_prefix != '/'"
